id: FP-0009
name: CloudTrail logging stopped or deleted
severity: high
language: kql
mde_portable: false
query: |
  AWSCloudTrailEvents
  | where Timestamp > ago(1h)
  | where EventSource == "cloudtrail.amazonaws.com"
  | where EventName in ("StopLogging", "DeleteTrail", "UpdateTrail", "DeleteEventDataStore")
  | project Timestamp, AccountId, AccountName, EventName,
            SourceIPAddress, UserAgent, UserIdentityArn
tags:
  - T1562.008
  - defense-evasion
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Verify with AWS admins — legitimate trail rotation creates similar events.
  UpdateTrail can fire during infrastructure-as-code deployments (Terraform, CDK).
