id: FP-0021
name: Cross-layer — Proofpoint phish blocked then Abnormal threat on same message
severity: critical
language: kql
mde_portable: false
query: |
  let ProofpointBlocked =
      ProofpointMessageEvents
      | where Timestamp > ago(24h)
      | where ActionType in ("PhishFiltered", "MalwareBlocked", "SandboxBlocked", "Quarantined")
      | project NetworkMessageId, PPTimestamp=Timestamp,
                SenderFromAddress, Subject, PhishScore, AttachmentSHA256;
  AbnormalThreatEvents
  | where Timestamp > ago(24h)
  | where ActionType == "ThreatDetected"
  | join kind=inner ProofpointBlocked on NetworkMessageId
  | project PPTimestamp, Timestamp, NetworkMessageId,
            SenderFromAddress, Subject, PhishScore, AbNormalScore,
            AttackType, ImpersonatedParty, RecipientEmailAddress,
            RemediationStatus, AttachmentSHA256
  | order by AbNormalScore desc
tags:
  - T1566.001
  - T1566.002
  - phishing
  - defense-evasion
  - cross-layer-correlation
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Cross-layer correlation on NetworkMessageId means both Proofpoint and Abnormal
  independently flagged the same message — two independent AI systems agreeing on a
  threat. This is extremely high fidelity. Treat as confirmed phishing campaign.
  Pivot to ProofpointClickEvents on NetworkMessageId to check if any user clicked
  URLs from this message before it was quarantined.
