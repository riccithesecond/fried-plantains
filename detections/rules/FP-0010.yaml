id: FP-0010
name: IAM user creation followed by admin policy attachment
severity: high
language: kql
mde_portable: false
query: |
  let new_users = AWSCloudTrailEvents
  | where Timestamp > ago(1h)
  | where EventName == "CreateUser"
  | project Timestamp, CreatedUser=tostring(RequestParameters.userName),
            Actor=UserIdentityArn, AccountId;
  AWSCloudTrailEvents
  | where Timestamp > ago(1h)
  | where EventName in ("AttachUserPolicy", "PutUserPolicy", "AddUserToGroup")
  | where tostring(RequestParameters) contains "Admin"
  | join kind=inner new_users on AccountId
  | project Timestamp, CreatedUser, Actor, EventName, RequestParameters
tags:
  - T1098
  - T1136.003
  - privilege-escalation
  - persistence
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Check if part of a provisioning pipeline (e.g. Terraform user bootstrap).
  Verify the actor identity and whether the created user appears in HRIS.
