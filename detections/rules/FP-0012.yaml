id: FP-0012
name: DNS queries matching Cloudflare threat intelligence
severity: medium
language: kql
mde_portable: false
query: |
  CloudflareDnsEvents
  | where Timestamp > ago(1h)
  | where ActionType in ("DnsThreatMatch", "DnsBlock")
  | where ThreatCategory != ""
  | summarize QueryCount=count(), UniqueUsers=dcount(UserID)
            by QueryName, ThreatCategory, ThreatIndicator
  | where QueryCount > 1
  | order by QueryCount desc
tags:
  - T1071.004
  - command-and-control
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Verify domain age and WHOIS. May be mislabeled newly registered domains or
  CDN endpoints. Check if the querying user has a legitimate business reason.
