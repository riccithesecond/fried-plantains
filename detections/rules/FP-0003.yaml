id: FP-0003
name: Network connection from mshta.exe (T1218.005)
description: >
  Detects mshta.exe (Microsoft HTML Application Host) establishing outbound network
  connections. mshta.exe is a signed Windows binary that can execute VBScript and
  JScript from remote URLs — a common LOLBin technique for payload delivery and C2
  communication that bypasses application whitelisting.
severity: high
language: kql
query: |
  DeviceNetworkEvents
  | where Timestamp > ago(1h)
  | where InitiatingProcessFileName =~ "mshta.exe"
  | where ActionType in ("ConnectionSuccess", "ConnectionFound")
  | where RemoteIP !startswith "10."
      and RemoteIP !startswith "192.168."
      and RemoteIP !startswith "172.16."
  | project Timestamp, DeviceName, RemoteIP, RemotePort, RemoteUrl,
            InitiatingProcessFileName, InitiatingProcessCommandLine,
            InitiatingProcessAccountName
  | order by Timestamp desc
tags:
  - T1218.005
  - defense-evasion
  - execution
mde_portable: true
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  mshta.exe making outbound connections is rarely legitimate. HTA applications
  embedded in SharePoint or enterprise intranets may trigger this — check RemoteUrl
  against your known-good internal domains before escalating.
