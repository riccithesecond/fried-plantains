id: FP-0019
name: Proofpoint — user clicked malicious URL (TAP click event)
severity: critical
language: kql
mde_portable: false
query: |
  ProofpointClickEvents
  | where Timestamp > ago(1h)
  | where ActionType == "UrlBlocked"
  | where Classification in ("phish", "malware", "ransomware")
  | project Timestamp, RecipientEmailAddress, SenderFromAddress,
            Url, UrlDomain, Classification, ThreatStatus,
            ClickIP, UserAgent, Blocked, CampaignId, NetworkMessageId
  | order by Timestamp desc
tags:
  - T1566.002
  - T1204.001
  - phishing
  - user-execution
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  URL clicks that Proofpoint blocked are confirmed threat interactions — user attempted
  to access a known-malicious URL. Even though the click was blocked, treat as an
  active phishing attempt. Pivot to DeviceNetworkEvents on ClickIP to check for
  follow-on browsing to the same domain from the endpoint.
