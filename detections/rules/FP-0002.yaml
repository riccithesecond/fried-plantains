id: FP-0002
name: Suspicious LSASS process access via OpenProcessApiCall
description: >
  Detects processes opening LSASS (Local Security Authority Subsystem Service) via
  OpenProcessApiCall, which is the primary technique used by credential dumping tools
  such as Mimikatz, ProcDump, and Task Manager credential extraction.
  Any non-system process accessing LSASS memory is highly suspicious.
severity: critical
language: kql
query: |
  DeviceProcessEvents
  | where Timestamp > ago(1h)
  | where ActionType == "OpenProcessApiCall"
  | where FileName =~ "lsass.exe"
  | where InitiatingProcessFileName !in~ ("MsMpEng.exe", "csrss.exe", "wininit.exe",
      "services.exe", "lsm.exe", "svchost.exe", "winlogon.exe")
  | project Timestamp, DeviceName, AccountName, InitiatingProcessFileName,
            InitiatingProcessCommandLine, InitiatingProcessAccountName,
            InitiatingProcessSHA256
  | order by Timestamp desc
tags:
  - T1003.001
  - credential-access
  - discovery
mde_portable: true
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Antivirus and EDR products legitimately access LSASS. The !in~ exclusion above
  covers common AV processes. Add your AV/EDR executable name to the exclusion
  list before deploying. Security tools performing memory scanning are common FPs.
