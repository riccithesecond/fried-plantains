id: SYN-0007
synthetic: true
name: PsExec lateral movement - remote process execution pattern
description: >
  Detects PsExec-style lateral movement by correlating network connections to SMB
  (port 445) with remote process creation via PSEXESVC. PsExec is the most commonly
  observed tool for lateral movement in enterprise intrusions. The correlation of
  network + process events reduces false positives from legitimate admin use.
severity: high
language: kql
query: |
  let psexecNetwork = DeviceNetworkEvents
  | where Timestamp > ago(1h)
  | where RemotePort == 445
  | where ActionType == "ConnectionSuccess"
  | where InitiatingProcessFileName in~ ("PsExec.exe", "PsExec64.exe", "psexesvc.exe")
  | project NetworkTimestamp = Timestamp, DeviceName, RemoteIP,
            InitiatingProcessFileName, InitiatingProcessAccountName;
  let psexecProcess = DeviceProcessEvents
  | where Timestamp > ago(1h)
  | where InitiatingProcessFileName =~ "PSEXESVC.exe"
      or ProcessCommandLine contains "\\\\PSEXESVC"
  | project ProcessTimestamp = Timestamp, DeviceName, AccountName,
            FileName, ProcessCommandLine, InitiatingProcessFileName;
  psexecNetwork
  | join kind=inner psexecProcess on DeviceName
  | project NetworkTimestamp, ProcessTimestamp, DeviceName, RemoteIP,
            AccountName, FileName, ProcessCommandLine, InitiatingProcessAccountName
  | order by NetworkTimestamp desc
tags:
  - T1021
  - T1570
  - lateral-movement
  - execution
mde_portable: true
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Legitimate IT admin use of PsExec for remote management is common. Check
  InitiatingProcessAccountName — service accounts or jump server accounts running
  PsExec to known admin targets are likely legitimate. Privileged access workstation
  (PAW) source IPs should be allowlisted. Out-of-hours PsExec activity is the
  strongest FP discriminator.
