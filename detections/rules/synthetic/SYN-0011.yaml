id: SYN-0011
synthetic: true
name: Spike in Cloudflare WAF blocks from single IP
severity: medium
language: kql
mde_portable: false
query: |
  CloudflareFirewallEvents
  | where Timestamp > ago(1h)
  | where ActionType in ("WAFBlock", "FirewallBlock")
  | summarize BlockCount=count(), UniqueURIs=dcount(ClientRequestURI)
            by ClientIP, ClientCountry, FirewallRuleDescription
  | top 10 by BlockCount
tags:
  - T1190
  - initial-access
  - reconnaissance
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  May be a security scanner or penetration test. Correlate with change requests
  and check if the IP belongs to a known scanner (Shodan, Censys, BurpSuite Cloud).
