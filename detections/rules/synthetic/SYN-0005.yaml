id: SYN-0005
synthetic: true
name: Brute force pattern — high failed logon count per account
description: >
  Detects accounts accumulating large numbers of failed logon attempts within
  a one-hour window. Surfaces the highest-volume targets first. A follow-on
  manual investigation should confirm whether a successful logon occurred after
  the failures (credential stuffing that succeeded).
severity: high
language: kql
query: |
  DeviceLogonEvents
  | where Timestamp > ago(1h)
  | where ActionType == "LogonFailed"
  | summarize FailCount = count(), LastFail = max(Timestamp)
      by AccountName, AccountDomain, DeviceName
  | top 20 by FailCount
tags:
  - T1110
  - T1078
  - credential-access
  - initial-access
mde_portable: false
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Users who mistype passwords frequently may trigger this. Service accounts with
  rotating passwords during scheduled tasks are common FPs. Check if RemoteIP is
  an internal system performing automated logons. The FailCount threshold (5) can
  be tuned based on environment baselines.
