id: SYN-0014
synthetic: true
name: Zscaler DLP policy violation — potential data exfiltration
severity: high
language: kql
mde_portable: false
query: |
  ZscalerWebEvents
  | where Timestamp > ago(1h)
  | where ActionType == "DlpViolation"
  | summarize ViolationCount=count(), TotalBytesOut=sum(BytesOut),
            UniqueDestinations=dcount(RequestHost)
            by UserName, Department, PolicyName
  | top 10 by TotalBytesOut
tags:
  - T1048
  - exfiltration
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Check if user is working with sensitive data legitimately (e.g. legal discovery,
  finance reporting). Verify department context and confirm with the user's manager.
