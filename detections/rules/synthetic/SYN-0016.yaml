id: SYN-0016
synthetic: true
name: Proofpoint — high-confidence phishing blocked, VeryMalicious sender
severity: high
language: kql
mde_portable: false
query: |
  ProofpointMessageEvents
  | where Timestamp > ago(1h)
  | where ActionType in ("PhishFiltered", "Quarantined")
  | where SenderReputation == "VeryMalicious"
  | project Timestamp, SenderFromAddress, SenderFromDomain, SenderIP,
            SenderReputation, RecipientEmailAddress, Subject,
            PhishScore, ImpostorScore, SpamVerdict, PhishVerdict,
            DispositionAction, QuarantineFolder, NetworkMessageId
  | order by PhishScore desc
tags:
  - T1566.001
  - phishing
  - initial-access
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  VeryMalicious senders with quarantined phishing are extremely high fidelity.
  Confirm delivery to quarantine folder and check if any copies slipped through
  to additional recipients before the rule fired.
