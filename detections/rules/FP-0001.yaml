id: FP-0001
name: Suspicious PowerShell encoded command execution
description: >
  Detects base64-encoded PowerShell commands (-EncodedCommand) commonly used in
  living-off-the-land attacks and malware loaders. Encoded commands obscure intent
  and bypass simple string-based detections.
severity: high
language: kql
query: |
  DeviceProcessEvents
  | where Timestamp > ago(1h)
  | where FileName =~ "powershell.exe" or FileName =~ "pwsh.exe"
  | where ProcessCommandLine contains "-EncodedCommand"
      or ProcessCommandLine contains "-enc "
      or ProcessCommandLine contains "-ec "
  | project Timestamp, DeviceName, AccountName, ProcessCommandLine,
            InitiatingProcessFileName, InitiatingProcessCommandLine
  | order by Timestamp desc
tags:
  - T1059.001
  - execution
  - defense-evasion
mde_portable: true
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  May trigger on legitimate admin automation. Verify AccountName and
  InitiatingProcessFileName context before escalating. Common FP sources:
  SCCM/ConfigMgr deployments, Azure Arc agent, legitimate pentest tooling.
