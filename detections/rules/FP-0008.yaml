id: FP-0008
name: AWS root account API call
severity: critical
language: kql
mde_portable: false
query: |
  AWSCloudTrailEvents
  | where Timestamp > ago(1h)
  | where UserIdentityType == "Root"
  | where ActionType !in ("AuthAttempt")
  | project Timestamp, AccountId, EventName, EventSource,
            SourceIPAddress, UserAgent, MFAAuthenticated
  | order by Timestamp desc
tags:
  - T1078.004
  - privilege-escalation
  - initial-access
enabled: true
created_at: 2025-01-01T00:00:00Z
updated_at: 2025-01-01T00:00:00Z
author: fried-plantains
false_positive_notes: >
  Root account usage should be near zero in a well-governed AWS environment.
  Verify with the AWS account owner — legitimate use cases are break-glass
  scenarios only.
